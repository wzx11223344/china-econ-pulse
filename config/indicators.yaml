# =============================================================================
# china-econ-pulse 指标定义与阈值配置
# =============================================================================

# --- 经济脉搏指数 (Pulse Index) 权重 ---
pulse_weights:
  pmi_manufacturing: 0.20
  caixin_pmi: 0.15
  electricity_growth: 0.15
  freight_growth: 0.10
  new_loans: 0.10
  consumer_confidence: 0.10
  ppi_yoy: 0.10
  retail_sales: 0.10

# --- Pulse Index 区间阈值 ---
thresholds:
  expansion: 60        # >= 60: 扩张
  stable: 40           # >= 40: 平稳
  contraction: 20      # >= 20: 收缩
                        # <  20: 预警

# --- 趋势判定阈值 ---
trend_signal:
  strong_up: 5.0       # MoM change >= 5: 加速上行
  mild_up: 1.0         # MoM change >= 1: 温和回升
  flat_min: -1.0       # |change| <= 1: 横盘整理
  mild_down: -5.0      # MoM change <= -5: 边际走弱
                        # MoM change <  -5: 加速下行

# --- 六维雷达图分类 ---
indicator_groups:
  production:
    - industrial_production
    - electricity
    - pmi_manufacturing
  demand:
    - retail_sales
    - consumer_confidence
    - imports
  prices:
    - cpi
    - ppi
    - new_home_prices
  finance:
    - m2
    - social_financing
    - new_loans
  trade:
    - exports
    - imports
    - trade_balance
  property:
    - floor_space_sold
    - real_estate_investment
    - new_home_prices

# --- 全量指标定义 (用于数据附录与可视化) ---
indicators:
  - id: pmi_manufacturing
    name: "制造业PMI"
    name_en: "Manufacturing PMI"
    unit: "%"
    frequency: monthly
    source: "国家统计局"
    category: production
    is_leading: true

  - id: pmi_non_manufacturing
    name: "非制造业PMI"
